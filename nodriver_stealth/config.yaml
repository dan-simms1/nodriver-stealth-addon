name: nodriver Stealth Browser
version: "1.0.0"
slug: nodriver_stealth
description: >-
  nodriver (Python; CDP-direct browser automation, no WebDriver
  protocol) packaged as a Home Assistant add-on, exposing the same
  generic HTTP flow runner API as the playwright-stealth-addon. Use
  as an alternative to the Patchright addon when the Cloudflare /
  Akamai bot-management evasion characteristics differ on the target
  site. Optional Xvfb + noVNC viewer for live browser observation.
url: "https://github.com/dan-simms1/nodriver-stealth-addon"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
host_network: false
ports:
  3002/tcp: 3002
  7902/tcp: 7902
ports_description:
  3002/tcp: Flow runner HTTP service (no authentication; LAN use only)
  7902/tcp: noVNC viewer (only active when vnc_enabled=true)
options:
  runner_port: 3002
  log_level: info
  vnc_enabled: false
  vnc_password: ""
schema:
  runner_port: port
  log_level: list(silent|error|warn|info|debug|trace)
  vnc_enabled: bool
  vnc_password: str?
